services:
  - type: web
    name: tecfag-mrp
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: tecfag-mrp-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_PATH
        value: /data/tecfag_mrp.db
      - key: UPLOADS_PATH
        value: /data/uploads
